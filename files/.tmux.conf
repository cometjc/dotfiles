# Powerline Tmux statusline:
setenv -g PATH "$HOME/.bin:$PATH"

# Reset all bindings to tmux defaults before each reload so stale bindings
# from removed config lines cannot survive.
unbind-key -a
if-shell "[ -f ~/.tmux-defaults.conf ]" 'source-file ~/.tmux-defaults.conf'

# 全球選項
set-option -g  mouse                        on

set-option -g  renumber-windows             on
set-option -g  prefix                       C-a # 將前綴從 C-b 改為 C-a
set-option -g  prefix2                      C-b # Keep Ctrl-b as a secondary prefix
set-option -g  escape-time                  0   # 設定前綴和命令之間的延遲
set-option -g  history-limit                100000

# 設定終端機覆蓋選項 (已修正重複設定)
set-option -g  default-terminal             "tmux-256color"
set-option -ga terminal-overrides           ",xterm*:Tc,putty-256color:Tc"
set        -ga terminal-features            "*:hyperlinks"


# List of plugins
set        -g @plugin                  'tmux-plugins/tmux-sensible'
set-option -g @plugin                  'tmux-plugins/tpm'
set-option -g @plugin                  'tmux-plugins/tmux-resurrect'
set-option -g @continuum-save-interval '2'
set-option -g @continuum-restore       'on'
set-option -g @plugin                  'tmux-plugins/tmux-continuum'
set-option -g @plugin                  'tmux-plugins/tmux-cowboy'
set        -g @tmux_power_show_user    false
set        -g @tmux_power_show_host    false
set        -g @tmux_power_show_session true
set-option -g @plugin                  'wfxr/tmux-power'
set-option -g @tmux_power_theme        'everforest'
set-option -g @plugin                  'b0o/tmux-autoreload'
set-option -g @plugin                  '$HOME/repo/tmux-agent-status'
run-shell "$HOME/.tmux.d/tmux-alt-lr-target.sh ensure-default remote >/dev/null 2>&1 || tmux display-message 'tmux: tmux-alt-lr-target.sh not found or failed'"

# set -g @plugin 'noscript/tmux-mighty-scroll'

# Initialize TMUX plugin manager (已修正語法錯誤並移除多餘指令)
if-shell "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

run '~/.tmux/plugins/tpm/tpm'
run-shell "$HOME/.tmux.d/tmux-local-plugins-loader.sh '$HOME/repo/dotfiles/files/.tmux.conf' 2>/dev/null || tmux display-message 'tmux: tmux-local-plugins-loader.sh not found or failed'"
set-option -g  status-interval              2
run-shell "$HOME/.tmux.d/tmux-sync-session-width.sh '#{session_name}' 2>/dev/null || tmux display-message 'tmux: tmux-sync-session-width.sh not found or failed'"
set-hook -g  client-attached                "run-shell '$HOME/.tmux.d/tmux-sync-session-width.sh #{session_name} || true'"
set-hook -ag client-attached                "run-shell -b '$HOME/.tmux.d/tmux-term-keybindings.sh #{client_termname} #{client_name} >/dev/null 2>&1 || true'"
set-hook -g  client-detached                "run-shell '$HOME/.tmux.d/tmux-sync-session-width.sh #{session_name} || true'"
set-hook -g  client-resized                 "run-shell '$HOME/.tmux.d/tmux-sync-session-width.sh #{session_name} || true'"
set-hook -g  client-session-changed         "run-shell '$HOME/.tmux.d/tmux-sync-session-width.sh #{session_name} || true'"

# Override tmux-power's session segment to remove the hardcoded padding spaces.
set-option -g  status-left                  "#[fg=#a7c080]#[bg=#3a3a3a]#S#[fg=#3a3a3a]#[bg=#262626]"
# Collapse the right status segments based on the remaining width after
# estimating how much space status-left + the window list already consume.
# 1. Keep full WxH when there is enough remaining room.
# 2. Keep compact WxH on medium remaining widths.
# 3. Hide it when the remainder is too small.
set-option -g  status-right                 "#{?#{@claude_status},#[fg=#e5c07b]#[bg=#3a3a3a] #{@claude_status} ,}#{?#{>=:#{@status_available_width},28},#[fg=#3a3a3a]#[fg=#a7c080]#[bg=#3a3a3a]  %T #[fg=#a7c080]#[bg=#3a3a3a]#[fg=#262626]#[bg=#a7c080]  %F ,#{?#{>=:#{@status_available_width},16},#[fg=#3a3a3a]#[fg=#a7c080]#[bg=#3a3a3a]  %T ,}}"
# tmux-agent-status (loaded via local TPM plugin path) owns the agent-status
# hooks, polling scripts, and window-status format wiring.
# Remove legacy @claude_status from status-right; workmux badges handle agent state.
set-option -g  status-right                 "#{?#{>=:#{@status_available_width},28},#[fg=#3a3a3a]#[fg=#a7c080]#[bg=#3a3a3a]  #{window_width}x#{window_height} #[fg=#a7c080]#[bg=#3a3a3a]#[fg=#262626]#[bg=#a7c080]  #{window_width}x#{window_height} ,#{?#{>=:#{@status_available_width},16},#[fg=#3a3a3a]#[fg=#a7c080]#[bg=#3a3a3a]  #{window_width}x#{window_height} ,}}"

# Mouse scroll with strict anti-mistouch guard:
# Never auto-enter copy-mode on WheelUp.
# Only scroll tmux history when pane is already in copy-mode.
bind-key -n WheelUpPane   if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if-shell -F -t = '#{alternate_on}' 'send-keys -M' 'if-shell -F -t = \"#{pane_in_mode}\" \"send-keys -N 3 -X scroll-up\" \"send-keys -M\"'"
bind-key -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "send-keys -M"

# Ctrl + Scroll = PageUp/PageDown (Force send keys to pane)
bind-key -n C-WheelUpPane send-keys -t = PageUp
bind-key -n C-WheelDownPane send-keys -t = PageDown

bind-key -T copy-mode-vi WheelUpPane send-keys -N 3 -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -N 3 -X scroll-down
bind-key -T copy-mode    WheelUpPane send-keys -N 3 -X scroll-up
bind-key -T copy-mode    WheelDownPane send-keys -N 3 -X scroll-down

# Pane title
set-option        -g pane-border-status top
set-option        -g pane-border-format "#{session_name}:#{window_index}.#{pane_index}"

# 窗口選項
set-window-option -g automatic-rename on # 自動設定窗口標題
set-window-option -g mode-keys        vi
set-window-option -g monitor-activity off
set-window-option -g xterm-keys       on


# unbind-key C-b # Free the original Ctrl-b prefix keybinding
#unbind-key -n S-Up
#unbind-key -n S-Down

# User-defined key sequences for nonstandard modifiers/keys.
#set -s user-keys[0] "\033[1;2A"   # Shift-Up
#set -s user-keys[1] "\033[1;2B"   # Shift-Down
set -s user-keys[2] "\033[1;6D"   # Ctrl-Shift-Left
set -s user-keys[3] "\033[1;6C"   # Ctrl-Shift-Right
set -s user-keys[4] "\033\033[1~" # Alt-Home
set -s user-keys[5] "\033\033[4~" # Alt-End
set -s user-keys[6] "\033\033[5~" # Alt-PageUp
set -s user-keys[7] "\033\033[6~" # Alt-PageDown
set -s user-keys[8] "\033[5;5~"   # Ctrl-PageUp (terminal fallback)
set -s user-keys[9] "\033[6;5~"   # Ctrl-PageDown (terminal fallback)

#unbind-key -n User0
#unbind-key -n User1
bind-key -n User4 send-keys -l "\033[1;9~" # Alt+Home
bind-key -n User5 send-keys -l "\033[4;9~" # Alt+End
bind-key -n User6 send-keys -l "\033[5;9~" # Alt+PageUp
bind-key -n User7 send-keys -l "\033[6;9~" # Alt+PageDown
bind-key -n User8 copy-mode -e              # Ctrl+PageUp fallback
bind-key -n User9 next-window               # Ctrl+PageDown fallback

bind-key -n M-j       resize-pane -D
bind-key -n M-k       resize-pane -U
bind-key -n M-h       resize-pane -L
bind-key -n M-l       resize-pane -R
bind-key -n M-F3      new-window -a -c "#{pane_current_path}" \; rename-window ""
bind-key -n M-F2      command-prompt 'rename-window "%%" ; set-option -w automatic-rename off'
bind-key -n C-F2      command-prompt 'rename-window "%%" ; set-option -w automatic-rename off'

# Ctrl + PageUp enters copy-mode; PageDown keeps window switching
bind-key -n C-PPage   copy-mode -e
bind-key -n C-NPage   next-window

# Shift arrow should use tmux's native key names.
# The previous User2/User3 fallback only matched Ctrl+Shift-Left/Right
# and could leave the trailing C/D bytes visible in the pane.
bind-key -n S-Left  swap-window -t -1\; select-window -t -1
bind-key -n S-Right swap-window -t +1\; select-window -t +1

# Keep explicit fallbacks for terminals that emit Ctrl+Shift-Left/Right.
bind-key -n User2 swap-window -t -1\; select-window -t -1
bind-key -n User3 swap-window -t +1\; select-window -t +1



bind-key m   set-option mouse\; display-message "Mouse is now #{?mouse,on,off}"
bind-key C-a send-prefix          # Prefix + Ctrl-a sends a literal Ctrl-a to the pane
bind-key C-b send-keys C-b       # Prefix + Ctrl-b sends a literal Ctrl-b to the pane
bind-key z   run-shell '$HOME/.tmux.d/tmux-alt-lr-target.sh toggle || tmux display-message "tmux-alt-lr-target.sh: not found or failed"'
bind-key l   run-shell "lnav-tmux-output"
bind-key r   source-file ~/.tmux.conf \; display "Reloaded!" # Reload the file with Prefix r
# Prefix + b: move current window to background session `bg` (create if missing).
# If source session has only one window, create a placeholder first so client remains attached.
bind-key b   if-shell -F '#{==:#{session_name},bg}' 'display-message "Already in bg"' 'run-shell "created_bg=0; if ! tmux has-session -t bg 2>/dev/null; then tmux new-session -d -s bg; created_bg=1; fi; if [ \"#{session_windows}\" = \"1\" ]; then tmux new-window -d -t \"#{session_name}:\" -n keep; fi; if tmux move-window -s \"#{window_id}\" -t \"bg:\"; then if [ \"$created_bg\" = \"1\" ]; then tmux kill-window -t \"bg:0\" 2>/dev/null || true; fi; tmux display-message \"Moved window to bg\"; fi"'
# Prefix + Tab: round-robin switch sessions (includes `bg`).
bind-key Tab switch-client -n
bind-key s   split-window -v -c "#{pane_current_path}"
bind-key v   split-window -h -c "#{pane_current_path}"
bind-key -n C-`   split-window -h -c "#{pane_current_path}"
bind-key *   set-window-option synchronize-panes
bind-key n   next-window
bind-key p   previous-window
# 在新窗口中運行 lnav
bind-key h capture-pane -S - \; save-buffer /tmp/tmux_buffer.txt \; new-window "exec lnav /tmp/tmux_buffer.txt"
